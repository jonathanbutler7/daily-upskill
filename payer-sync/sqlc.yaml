version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations/*.up.sql"
    queries:
      - "db/queries"
    gen:
      go:
        package: "store"
        out: "internal/db/store"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
